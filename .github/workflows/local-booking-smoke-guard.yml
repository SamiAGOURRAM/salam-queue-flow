name: Local Booking Smoke Guard

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  local-booking-smoke-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        run: supabase start

      - name: Reset local database (migrations + seed)
        run: supabase db reset --local --yes

      - name: Run local web booking smoke test
        run: pnpm run test:smoke:web-booking-local

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop || true
